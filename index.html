        // Funkcja sprawdzająca automatycznie, czy czas na typowanie minął
        function isMatchLocked(match) {
            const dateParts = match.date.split('.'); 
            const timeParts = match.time.split(':'); 
            
            const matchDateTime = new Date(
                parseInt(dateParts[2]), 
                parseInt(dateParts[1]) - 1, 
                parseInt(dateParts[0]), 
                parseInt(timeParts[0]), 
                parseInt(timeParts[1])
            );
            
            const now = new Date();
            return now >= matchDateTime;
        }

        function toggleLanguage() {
            currentLang = currentLang === 'pl' ? 'en' : 'pl';
            updateTexts();
            if (nickname !== '') {
                renderMatches();
            }
        }

            const data = langData[currentLang];
            document.getElementById('main-title').innerText = data.title;
            document.getElementById('login-heading').innerText = data.loginHeading;
            document.getElementById('login-btn').innerText = data.loginBtn;
            document.getElementById('welcome-text').innerText = data.welcome;
            document.getElementById('instruction-text').innerText = data.instruction;
            document.getElementById('btn-text-download').innerText = data.downloadBtn;
            document.getElementById('lang-btn').innerText = data.langBtn;
            document.getElementById('nickname-input').placeholder = data.placeholder;

            // Tłumaczenie przycisków filtrowania
            document.getElementById('filter-all').innerText = data.filterAll;
            document.getElementById('filter-1').innerText = data.filter1;
            document.getElementById('filter-2').innerText = data.filter2;
            document.getElementById('filter-3').innerText = data.filter3;
        }

        function startApp() {
            const input = document.getElementById('nickname-input').value.trim();
            if (!input) {
                alert(langData[currentLang].alertNick);
                return;
            }
            nickname = input;
            document.getElementById('user-display').innerText = nickname;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            renderMatches();
        }

            filters.forEach(r => {
                const searchId = 'filter-' + r;
                const btn = document.getElementById(searchId);
                const compareValue = r === 'all' ? 'all' : parseInt(r);
                if (compareValue === round) {
                    btn.className = "px-4 py-2 rounded-lg text-sm font-semibold transition bg-emerald-500 text-slate-950 cursor-pointer";
                } else {
                    btn.className = "px-4 py-2 rounded-lg text-sm font-semibold transition bg-slate-800 hover:bg-slate-700 text-slate-300 cursor-pointer";
                }
            });
            renderMatches();
        }

        function renderMatches() {
            const container = document.getElementById('matches-container');
            container.innerHTML = '';

            let lastDisplayedRound = 0;

            matches.forEach(match => {
                if (currentFilter !== 'all' && match.round !== currentFilter) return;

                if (match.round !== lastDisplayedRound) {
                    lastDisplayedRound = match.round;
                    const roundHeader = document.createElement('h3');
                    roundHeader.className = "text-md font-bold text-cyan-400 mt-6 mb-2 uppercase tracking-wider border-l-4 border-cyan-500 pl-2";
                    roundHeader.innerText = currentLang === 'pl' ? 'Kolejka ' + lastDisplayedRound : 'Round ' + lastDisplayedRound;
                    container.appendChild(roundHeader);
                }

                const locked = isMatchLocked(match);

                const card = document.createElement('div');
                if (locked) {
                    card.className = "flex flex-col sm:flex-row items-center justify-between p-3 rounded-xl border transition gap-2 bg-slate-800/20 border-slate-800/60 text-slate-500";
                } else {
                    card.className = "flex flex-col sm:flex-row items-center justify-between p-3 rounded-xl border transition gap-2 bg-slate-800 border-slate-700/80 hover:border-slate-600 text-white shadow-md";
                }

                const infoDiv = document.createElement('div');
                infoDiv.className = "text-center sm:text-left flex sm:flex-col items-center sm:items-start gap-2 sm:gap-0";
                
                let badgeHtml = '<span class="text-[11px] font-semibold bg-slate-950 px-2 py-0.5 rounded text-slate-400">' + match.date + ' ' + match.time + '</span>';
                if (locked) {
                    badgeHtml += '<span class="text-[10px] text-amber-500/80 font-bold uppercase tracking-tight mt-0.5">[' + langData[currentLang].lockedTag + ']</span>';
                }
                infoDiv.innerHTML = badgeHtml;

                const teamsDiv = document.createElement('div');
                teamsDiv.className = "flex items-center gap-2 justify-center w-full sm:w-auto";
                
                let inputA = '';
                let inputB = '';

                if (locked) {
                    inputA = '<span class="w-10 text-center font-bold text-slate-500 bg-slate-900/40 py-1 rounded border border-slate-800">' + (match.scoreA === "" ? "-" : match.scoreA) + '</span>';
                    inputB = '<span class="w-10 text-center font-bold text-slate-500 bg-slate-900/40 py-1 rounded border border-slate-800">' + (match.scoreB === "" ? "-" : match.scoreB) + '</span>';
                } else {
                    // Dodanie klas warunkowych dla brakujących typów przy renderowaniu
                    const classA = match.scoreA === "" ? "border-red-500 bg-red-950/20 focus:border-red-400" : "border-slate-600 focus:border-emerald-400";
                    const classB = match.scoreB === "" ? "border-red-500 bg-red-950/20 focus:border-red-400" : "border-slate-600 focus:border-emerald-400";

                    inputA = '<input type="number" min="0" placeholder="- " value="' + match.scoreA + '" oninput="updateScore(' + match.id + ', \'A\', this)" class="w-10 bg-slate-950 border ' + classA + ' rounded text-center py-1 font-bold text-emerald-400 focus:outline-none text-sm transition-colors duration-200">';
                    inputB = '<input type="number" min="0" placeholder="- " value="' + match.scoreB + '" oninput="updateScore(' + match.id + ', \'B\', this)" class="w-10 bg-slate-950 border ' + classB + ' rounded text-center py-1 font-bold text-emerald-400 focus:outline-none text-sm transition-colors duration-200">';
                }

                // Pobranie przetłumaczonych nazw drużyn ze słownika
                const translatedTeamA = teamTranslations[currentLang][match.teamA] || match.teamA;
                const translatedTeamB = teamTranslations[currentLang][match.teamB] || match.teamB;

                teamsDiv.innerHTML = '<span class="text-right w-32 md:w-40 font-medium text-sm truncate">' + translatedTeamA + '</span>' +
                                     inputA +
                                     '<span class="text-slate-600 font-bold text-xs">:</span>' +
                                     inputB +
                                     '<span class="text-left w-32 md:w-40 font-medium text-sm truncate">' + translatedTeamB + '</span>';

                card.appendChild(infoDiv);
                card.appendChild(teamsDiv);
                container.appendChild(card);
            });
        }

        function updateScore(id, team, inputEl) {
            const value = inputEl.value;
            const match = matches.find(m => m.id === id);
            if (match && !isMatchLocked(match)) {
                if (team === 'A') match.scoreA = value;
                if (team === 'B') match.scoreB = value;

                // Dynamiczna zmiana klas elementu input bez pełnego przeładowania listy (wygoda pisania)
                if (value === "") {
                    inputEl.classList.add('border-red-500', 'bg-red-950/20', 'focus:border-red-400');
                    inputEl.classList.remove('border-slate-600', 'focus:border-emerald-400');
                } else {
                    inputEl.classList.remove('border-red-500', 'bg-red-950/20', 'focus:border-red-400');
                    inputEl.classList.add('border-slate-600', 'focus:border-emerald-400');
                }
            }
        }

        function generateFile() {
            const data = langData[currentLang];
            let allFilled = true;
            matches.forEach(m => {
                if (currentFilter !== 'all' && m.round !== currentFilter) return;
                if (!isMatchLocked(m) && (m.scoreA === "" || m.scoreB === "")) {
                    allFilled = false;
                }
            });

            if (!allFilled) {
                alert(data.alertFinished);
                return;
            }

            let fileContent = data.fileTitle + "\n";
            fileContent += data.filePlayer + ": " + nickname + "\n";
            fileContent += data.filePool + ": " + (currentFilter === 'all' ? data.fileFull : data.fileRoundLabel + currentFilter) + "\n";
            fileContent += "========================================================\n\n";

            matches.forEach(m => {
                if (currentFilter !== 'all' && m.round !== currentFilter) return;
                const locked = isMatchLocked(m);
                
                // Zapisz do pliku nazwy państw w wybranym języku
                const tA = teamTranslations[currentLang][m.teamA] || m.teamA;
                const tB = teamTranslations[currentLang][m.teamB] || m.teamB;
                
                fileContent += "[" + data.fileRoundLabel + m.round + "] " + m.date + " " + m.time + " | " + tA + " " + m.scoreA + ":" + m.scoreB + " " + tB + (locked ? ' (' + data.lockedTag + ')' : '') + "\n";
            });

            fileContent += "\n========================================================\n" + data.fileFooter;

            const blob = new Blob([fileContent], { type: "text/plain;charset=utf-8" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "predictions_wc2026_" + nickname.replace(/[^a-zA-Z0-9]/g, "_") + ".txt";
            link.click();
            URL.revokeObjectURL(link.href);
        }

        // Automatyczne załadowanie tekstów przy otwarciu strony
        window.onload = function() {
            updateTexts();
        };
    </script>
</body>
</html>
